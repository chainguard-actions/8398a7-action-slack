name: Test status input (success)
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        continue-on-error: true
        with:
          status: success
          author_name: test-author
          text: Test notification from act

      - name: Assert action ran (expected to fail without webhook URL)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # Without SLACK_WEBHOOK_URL the action should fail with a known error
          if [ "$OUTCOME" != "failure" ] && [ "$OUTCOME" != "success" ]; then
            echo "FAIL: expected outcome to be 'failure' or 'success', got '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action ran with status input"
