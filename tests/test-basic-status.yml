name: Test basic status input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: https://hooks.slack.com/services/TEST/TEST/TEST
        with:
          status: success
          author_name: test-runner
          text: "Test notification from act"
      - name: Assert action ran with status input
        run: |
          echo "Action completed (may have failed due to dummy webhook URL)"
          echo "PASS: status input was accepted by the action"
