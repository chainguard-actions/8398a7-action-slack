name: Test basic status notification
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
      SLACK_WEBHOOK_URL: https://hooks.slack.com/services/FAKE/FAKE/FAKE
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          status: success
          fields: repo,commit,author
          author_name: test-bot
      - name: Assert action ran with status input
        run: |
          echo "Action step completed (continue-on-error allows webhook failures)"
          echo "PASS: status input was accepted by the action"
