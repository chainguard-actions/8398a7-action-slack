name: Test basic status input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          status: success
          fields: repo,commit,author
          author_name: test-bot
        env:
          SLACK_WEBHOOK_URL: https://hooks.slack.com/services/FAKE/FAKE/FAKE
      - name: Assert action was invoked with status input
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          # The action ran (success or failure due to invalid webhook is acceptable)
          # What matters is that the 'status' input was passed and the action was invoked
          if [ "${{ steps.action.outcome }}" = "" ]; then
            echo "FAIL: action step did not run at all"
            exit 1
          fi
          echo "PASS: action was invoked with status=success"
