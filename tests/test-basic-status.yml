name: Test basic status input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Start mock Slack webhook server
        run: |
          python3 -c "
          import http.server, threading, os, signal

          class Handler(http.server.BaseHTTPRequestHandler):
              def do_POST(self):
                  length = int(self.headers.get('Content-Length', 0))
                  body = self.rfile.read(length)
                  print('Mock webhook received:', body.decode())
                  self.send_response(200)
                  self.end_headers()
                  self.wfile.write(b'ok')
              def log_message(self, fmt, *args):
                  pass

          server = http.server.HTTPServer(('127.0.0.1', 9999), Handler)
          print('Mock webhook server listening on port 9999')
          server.serve_forever()
          " &
          sleep 1
          echo "SLACK_WEBHOOK_URL=http://127.0.0.1:9999/webhook" >> $GITHUB_ENV

      - id: action
        uses: .
        with:
          status: success
          fields: repo,commit
        env:
          SLACK_WEBHOOK_URL: http://127.0.0.1:9999/webhook

      - name: Assert action succeeded
        run: |
          echo "Action completed successfully with status=success"
          echo "PASS"
