name: Test custom payload input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
      SLACK_WEBHOOK_URL: https://hooks.slack.com/services/FAKE/FAKE/FAKE
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          status: custom
          custom_payload: |
            {
              "text": "Custom notification from test",
              "attachments": []
            }
          github_token: ${{ github.token }}
      - name: Assert action was invoked with custom_payload input
        run: |
          echo "Action step outcome: ${{ steps.action.outcome }}"
          # The action may fail due to fake webhook URL, but it must have been invoked
          # If outcome is 'skipped', that means the action was not invoked at all
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action step was skipped, expected it to run"
            exit 1
          fi
          echo "PASS: action was invoked with custom_payload input"
