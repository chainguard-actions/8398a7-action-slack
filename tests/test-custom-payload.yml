name: Test custom_payload input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Start mock Slack webhook server
        run: |
          python3 -c "
          import http.server, threading

          class Handler(http.server.BaseHTTPRequestHandler):
              def do_POST(self):
                  length = int(self.headers.get('Content-Length', 0))
                  body = self.rfile.read(length)
                  print('Mock webhook received:', body.decode())
                  self.send_response(200)
                  self.end_headers()
                  self.wfile.write(b'ok')
              def log_message(self, fmt, *args):
                  pass

          server = http.server.HTTPServer(('127.0.0.1', 9998), Handler)
          print('Mock webhook server listening on port 9998')
          server.serve_forever()
          " &
          sleep 1

      - id: action
        uses: .
        with:
          status: custom
          custom_payload: |
            {
              text: 'Custom notification from test',
              attachments: [{
                color: 'good',
                text: 'Test passed'
              }]
            }
        env:
          SLACK_WEBHOOK_URL: http://127.0.0.1:9998/webhook

      - name: Assert action succeeded with custom payload
        run: |
          echo "Action completed successfully with status=custom and custom_payload"
          echo "PASS"
