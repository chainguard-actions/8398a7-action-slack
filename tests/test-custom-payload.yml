name: Test custom_payload input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up dummy Slack webhook
        run: |
          # Start a simple HTTP server that accepts POST requests and returns 200
          python3 -c "
import http.server, threading

class Handler(http.server.BaseHTTPRequestHandler):
    def do_POST(self):
        length = int(self.headers.get('Content-Length', 0))
        body = self.rfile.read(length)
        print('Received POST body:', body.decode(), flush=True)
        self.send_response(200)
        self.end_headers()
        self.wfile.write(b'ok')
    def log_message(self, format, *args):
        pass

server = http.server.HTTPServer(('127.0.0.1', 18081), Handler)
t = threading.Thread(target=server.serve_forever)
t.daemon = True
t.start()
import time; time.sleep(3600)
" &
          sleep 1
          echo "Mock Slack server started"
      - id: action
        uses: .
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: http://127.0.0.1:18081
        with:
          status: custom
          custom_payload: '{"text":"Hello from test","attachments":[]}'
      - name: Assert action ran with custom_payload input
        run: |
          echo "Action completed (continue-on-error allows webhook failures)"
          echo "PASS: custom_payload input was accepted"
